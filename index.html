<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="낙산회 주소록">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a1628">
<title>경동낙산회 회원 주소록</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a1628;--card:#0f1f3d;--card2:#162548;
  --acc:#4a90d9;--text:#e8eef7;--sub:#8aa4c8;--brd:#1e3a5f;
  --safe:env(safe-area-inset-bottom,0px)
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;min-height:100vh}
/* HEADER */
header{background:linear-gradient(160deg,#0d2244,#1a3a6b 55%,#2a5298);position:sticky;top:0;z-index:100;padding:env(safe-area-inset-top,0) 0 0;box-shadow:0 2px 16px rgba(0,0,0,.5)}
.hi{display:flex;align-items:center;gap:12px;padding:13px 16px}
.logo{width:42px;height:42px;object-fit:contain;border-radius:8px;flex-shrink:0}
.htxt h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.htxt .sub{font-size:11px;color:var(--sub);margin-top:1px}
.cnt{background:var(--acc);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;margin-left:auto;white-space:nowrap}
/* SEARCH */
.sw{padding:10px 14px 6px}
.sb{display:flex;align-items:center;background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:0 12px;gap:8px}
.sb input{flex:1;background:none;border:none;color:var(--text);font-size:15px;padding:11px 0;outline:none;font-family:inherit}
.sb input::placeholder{color:var(--sub)}
/* FILTER PILLS */
.fw{padding:0 14px 8px;overflow-x:auto;white-space:nowrap;scrollbar-width:none}
.fw::-webkit-scrollbar{display:none}
.pill{display:inline-block;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;margin-right:6px;background:#162d55;color:var(--sub);border:1px solid var(--brd);user-select:none;transition:all .18s}
.pill.on{background:var(--acc);color:#fff;border-color:var(--acc)}
/* LIST */
main{padding:0 14px calc(80px + var(--safe))}
.gl{font-size:12px;font-weight:700;color:var(--acc);letter-spacing:.5px;padding:14px 2px 6px;border-bottom:1px solid var(--brd);margin-bottom:8px}
.mc{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--brd);border-radius:14px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .18s}
.mc:active{transform:scale(.98);background:var(--card2)}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}
.ci{flex:1;min-width:0}
.cn{font-size:16px;font-weight:700}
.cs{font-size:12px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.cp{font-size:13px;color:var(--acc);margin-top:3px}
.ca{color:var(--sub);font-size:18px;flex-shrink:0}
.no{text-align:center;padding:60px 20px;color:var(--sub)}
.no div{font-size:40px;margin-bottom:10px}
/* OVERLAY + SHEET */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.ov.on{opacity:1;pointer-events:all}
.sh{position:fixed;left:0;right:0;bottom:0;z-index:201;background:#0d1e38;border-radius:24px 24px 0 0;padding:0 0 calc(20px + var(--safe));max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sh.on{transform:translateY(0)}
.shh{width:36px;height:4px;background:var(--brd);border-radius:2px;margin:12px auto 0}
.shhd{padding:18px 20px 10px;display:flex;flex-direction:column;align-items:center;gap:8px}
.shav{width:68px;height:68px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#fff}
.shnm{font-size:22px;font-weight:800;text-align:center}
.shps{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.shp{padding:4px 12px;border-radius:16px;font-size:12px;font-weight:600;background:#1a3a6b;color:var(--acc);border:1px solid var(--acc)}
.shdv{height:1px;background:var(--brd);margin:4px 20px}
.shr{display:flex;align-items:flex-start;gap:12px;padding:10px 20px}
.sri{font-size:18px;width:24px;text-align:center;flex-shrink:0;margin-top:1px}
.srl{font-size:11px;color:var(--sub);margin-bottom:2px}
.srv{font-size:15px;color:var(--text);word-break:break-word}
a.srv{color:var(--acc);text-decoration:none}
.shclose{margin:12px 20px 0;display:flex}
.shclose button{flex:1;padding:13px;background:var(--acc);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
/* INSTALL HINT */
.hint{position:fixed;bottom:calc(16px + var(--safe));left:50%;transform:translateX(-50%);background:#1a3a6b;color:var(--text);border:1px solid var(--acc);border-radius:14px;padding:12px 18px;font-size:13px;text-align:center;max-width:88vw;box-shadow:0 4px 20px rgba(0,0,0,.5);z-index:300;opacity:0;pointer-events:none;transition:opacity .4s}
.hint.on{opacity:1;pointer-events:auto}
.hint strong{color:var(--acc);display:block;margin-bottom:2px}
.hint-x{cursor:pointer;position:absolute;top:8px;right:12px;opacity:.6;font-size:14px}
</style>
</head>

const GRADS=[['#1565c0','#42a5f5'],['#00695c','#26a69a'],['#4527a0','#7e57c2'],
  ['#c62828','#ef5350'],['#e65100','#ffa726'],['#1b5e20','#66bb6a'],
  ['#ad1457','#f06292'],['#006064','#26c6da'],['#283593','#5c6bc0'],['#4e342e','#a1887f']];

function grad(n){
  var c=[...(n||'?')].reduce(function(a,x){return a+x.charCodeAt(0)},0)%GRADS.length;
  return'linear-gradient(135deg,'+GRADS[c][0]+','+GRADS[c][1]+')';
}
function av2(n){return(n||'?').slice(0,2)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function numCls(s){var m=String(s||'').match(/\d+/);return m?parseInt(m[0]):0}

var fCls='전체', q='';

function getClasses(){
  var seen={}, cl=[];
  DATA.forEach(function(m){if(m.class&&!seen[m.class]){seen[m.class]=1;cl.push(m.class)}});
  return cl.sort(function(a,b){return numCls(a)-numCls(b)});
}

function buildPills(){
  document.getElementById('cntBadge').textContent=DATA.length+'명';
  var cl=getClasses();
  document.getElementById('fw').innerHTML=['전체'].concat(cl).map(function(c){
    return '<span class="pill'+(c===fCls?' on':'')+'" onclick="setF(this,\'' +c.replace(/'/g,"&apos;")+ '\')" style="cursor:pointer">'+esc(c)+'</span>';
  }).join('');
}

function setF(el,c){
  fCls=c;
  document.querySelectorAll('.pill').forEach(function(p){p.classList.remove('on')});
  el.classList.add('on');
  render();
}

var FMETA=[
  {id:'title',    lbl:'직위',    icon:'💼'},
  {id:'company',  lbl:'직장명',  icon:'🏛️'},
  {id:'phone',    lbl:'휴대폰',  icon:'📞'},
  {id:'email',    lbl:'이메일',  icon:'✉️'},
  {id:'work_address',lbl:'직장주소',icon:'📍'},
  {id:'home_address',lbl:'집주소',  icon:'🏠'},
  {id:'fee2025',  lbl:'2025연회비',icon:'💰'},
  {id:'fee2026',  lbl:'2026연회비',icon:'💰'},
];

function render(){
  var qq=q.toLowerCase();
  var list=DATA.filter(function(m){
    if(fCls!=='전체'&&m.class!==fCls)return false;
    if(!qq)return true;
    return(m.name||'').toLowerCase().indexOf(qq)>=0||(m.phone||'').indexOf(qq)>=0;
  });
  var main=document.getElementById('main');
  if(!list.length){main.innerHTML='<div class="no"><div>🔍</div><p>검색 결과가 없습니다.</p></div>';return}

  var cl=fCls==='전체'?getClasses():[fCls];
  var h='';
  cl.forEach(function(c){
    var g=list.filter(function(m){return m.class===c}).sort(function(a,b){
      return(a.name||'').localeCompare(b.name||'','ko');
    });
    if(!g.length)return;
    h+='<div class="gl">'+esc(c)+' <span style="font-weight:400;color:var(--sub)">('+g.length+'명)</span></div>';
    g.forEach(function(m){
      var sub=[m.title,m.company].filter(Boolean).join(' · ');
      h+='<div class="mc" onclick="openSheet(\'' +m.id+ '\')">'
        +'<div class="av" style="background:'+grad(m.name)+'">'+esc(av2(m.name))+'</div>'
        +'<div class="ci">'
        +'<div class="cn">'+esc(m.name)+'</div>'
        +(sub?'<div class="cs">'+esc(sub)+'</div>':'')
        +(m.phone?'<div class="cp">📞 '+esc(m.phone)+'</div>':'')
        +'</div><div class="ca">›</div></div>';
    });
  });
  main.innerHTML=h;
}

function openSheet(id){
  var m=DATA.find(function(x){return x.id===id});if(!m)return;
  document.getElementById('shAv').style.background=grad(m.name);
  document.getElementById('shAv').textContent=av2(m.name);
  document.getElementById('shNm').textContent=m.name||'';
  var pills='';
  if(m.class)pills+='<span class="shp">'+esc(m.class)+'</span>';
  if(m.title)pills+='<span class="shp">'+esc(m.title)+'</span>';
  document.getElementById('shPs').innerHTML=pills;
  var rows='';
  FMETA.forEach(function(f){
    var v=m[f.id]||'';if(!v)return;
    var vh;
    if(f.id==='phone')      vh='<a class="srv" href="tel:'+encodeURIComponent(v)+'">'+esc(v)+'</a>';
    else if(f.id==='email') vh='<a class="srv" href="mailto:'+esc(v)+'">'+esc(v)+'</a>';
    else                    vh='<div class="srv">'+esc(v)+'</div>';
    rows+='<div class="shr"><div class="sri">'+f.icon+'</div><div><div class="srl">'+f.lbl+'</div>'+vh+'</div></div>';
  });
  document.getElementById('shBd').innerHTML=rows;
  document.getElementById('ov').classList.add('on');
  document.getElementById('sh').classList.add('on');
  document.body.style.overflow='hidden';
}

function closeSheet(){
  document.getElementById('ov').classList.remove('on');
  document.getElementById('sh').classList.remove('on');
  document.body.style.overflow='';
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeSheet()});
document.getElementById('q').addEventListener('input',function(e){q=e.target.value;render()});

// Install hint
(function(){
  var ua=navigator.userAgent, el=document.getElementById('hint'), txt=document.getElementById('hintTxt');
  var msg='';
  if(/iPhone|iPad|iPod/.test(ua)&&!/CriOS/.test(ua)&&!window.navigator.standalone)
    msg='<strong>홈 화면에 추가 (iPhone)</strong>Safari 하단 공유버튼 → 홈 화면에 추가';
  else if(/Android/.test(ua))
    msg='<strong>홈 화면에 추가 (Android)</strong>Chrome 메뉴(⋮) → 홈 화면에 추가';
  if(!msg||window.matchMedia('(display-mode:standalone)').matches)return;
  txt.innerHTML=msg;
  setTimeout(function(){el.classList.add('on');setTimeout(function(){el.classList.remove('on')},8000)},2500);
})();

buildPills();
render();
</script>
